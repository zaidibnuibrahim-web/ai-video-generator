<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
body{background:#000;color:white;text-align:center;font-family:Arial}
canvas{width:92vw;max-width:360px;border:2px solid white}
button{padding:12px;margin:10px;font-size:16px}
</style>
</head>

<body>

<h3>REAL AI HUMAN MOTION</h3>

<input type="file" id="upload"><br>
<canvas id="c" width="720" height="1280"></canvas><br>
<button onclick="generate()">GENERATE VIDEO</button>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let img=new Image();
let ready=false;

upload.onchange=e=>{
img.src=URL.createObjectURL(e.target.files[0]);
img.onload=()=>ready=true;
};

// ===== OBJECT AREA (posisi manusia tengah)
const body={
x:170,
y:260,
w:380,
h:600
};

// ===== HUMAN PHYSICS =====
let posY=0;
let velY=0;

function humanMotion(t){

// breathing
const breath=Math.sin(t*0.05)*6;

// weight shift
const shift=Math.sin(t*0.025)*10;

// inertia physics
const target=breath+shift;

velY+=(target-posY)*0.12;
velY*=0.85;

posY+=velY;

// head stabilization (anti goyang)
const stabilize=Math.sin(t*0.2)*1.2;

return{
y:posY,
scale:1+(breath*0.0009),
stabilize
};
}

// ===== FILM GRAIN =====
function grain(){
ctx.globalAlpha=0.05;
for(let i=0;i<40;i++){
ctx.fillStyle="white";
ctx.fillRect(
Math.random()*canvas.width,
Math.random()*canvas.height,
1,1
);
}
ctx.globalAlpha=1;
}

// ===== DRAW FRAME =====
function drawFrame(frame){

// background tetap
ctx.drawImage(img,0,0,canvas.width,canvas.height);

// ambil objek
const cut=ctx.getImageData(
body.x,
body.y,
body.w,
body.h
);

const m=humanMotion(frame);

ctx.save();

ctx.translate(
body.x+body.w/2,
body.y+body.h/2+m.y
);

ctx.scale(m.scale,m.scale);

ctx.putImageData(
cut,
-body.w/2,
-body.h/2
);

ctx.restore();

grain();
}

// ===== VIDEO EXPORT =====
function generate(){

if(!ready){
alert("Upload gambar dulu");
return;
}

const FPS=60;
const duration=12;
const total=FPS*duration;

const stream=canvas.captureStream(FPS);

const recorder=new MediaRecorder(stream,{
mimeType:"video/webm;codecs=vp9"
});

let chunks=[];

recorder.ondataavailable=e=>{
if(e.data.size>0)chunks.push(e.data);
};

recorder.onstop=()=>{
const blob=new Blob(chunks,{type:"video/webm"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="real_ai_human_motion.mp4";
a.click();
};

recorder.start();

let frame=0;

function animate(){
drawFrame(frame);
frame++;

if(frame<total){
requestAnimationFrame(animate);
}else{
recorder.stop();
}
}

animate();
}
</script>

</body>
</html>
