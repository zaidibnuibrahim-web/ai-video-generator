<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cinematic AI Video</title>

<style>
body{
    background:#000;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas{
    border:2px solid white;
    width:90vw;
    max-width:360px;
}
button{
    padding:12px;
    margin:10px;
    font-size:16px;
}
</style>
</head>

<body>

<h3>Cinematic AI Video Generator</h3>

<input type="file" id="imgInput" accept="image/*"><br>
<canvas id="canvas" width="720" height="1280"></canvas><br>

<button onclick="startRender()">Render Video</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();
let loaded = false;

// ================= LOAD IMAGE =================
document.getElementById("imgInput").onchange = e=>{
    const file = e.target.files[0];
    if(!file) return;

    img.src = URL.createObjectURL(file);

    img.onload = ()=>{
        loaded = true;
        drawFrame(0);
    };
};

// ================= DRAW FRAME =================
function drawFrame(t){

    // background hitam (anti putih)
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(!loaded) return;

    // zoom cinematic pelan
    const scale = 1 + t*0.0005;

    const w = canvas.width * scale;
    const h = canvas.height * scale;

    const x = (canvas.width - w)/2;
    const y = (canvas.height - h)/2;

    ctx.drawImage(img,x,y,w,h);

    filmGrain();
}

// ================= FILM GRAIN =================
const grain=document.createElement("canvas");
const gctx=grain.getContext("2d");
grain.width=80;
grain.height=140;

function filmGrain(){
    const data=gctx.createImageData(grain.width,grain.height);
    const buf=data.data;

    for(let i=0;i<buf.length;i+=4){
        const v=Math.random()*255;
        buf[i]=v;
        buf[i+1]=v;
        buf[i+2]=v;
        buf[i+3]=25;
    }

    gctx.putImageData(data,0,0);

    ctx.globalAlpha=0.15;
    ctx.drawImage(grain,0,0,canvas.width,canvas.height);
    ctx.globalAlpha=1;
}

// ================= VIDEO RENDER =================
function startRender(){

    if(!loaded){
        alert("Upload gambar dulu");
        return;
    }

    const stream = canvas.captureStream(30);

    const recorder = new MediaRecorder(stream,{
        mimeType:"video/webm"
    });

    let chunks=[];

    recorder.ondataavailable=e=>{
        if(e.data.size>0) chunks.push(e.data);
    };

    recorder.onstop=()=>{
        const blob=new Blob(chunks,{type:"video/webm"});
        const url=URL.createObjectURL(blob);

        const a=document.createElement("a");
        a.href=url;
        a.download="cinematic_ai_video.webm";
        a.click();
    };

    recorder.start();

    let frame=0;
    let total=180; // 6 detik

    function animate(){
        drawFrame(frame);
        frame+=2;

        if(frame<total){
            requestAnimationFrame(animate);
        }else{
            recorder.stop();
        }
    }

    animate();
}
</script>

</body>
</html>
