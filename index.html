<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Cinematic Video Generator</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
border-radius:12px;
margin-top:15px;
max-width:92%;
}

input{
margin-top:20px;
}
</style>
</head>

<body>

<h2>🎬 AI Cinematic Generator (REAL CAMERA)</h2>

<input type="file" id="imageInput" accept="image/*">

<br>
<canvas id="canvas"></canvas>

<script>

// ================= CANVAS 9:16 =================
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
const h=Math.min(window.innerHeight*0.75,960);
canvas.height=h;
canvas.width=h*(9/16);
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

// ================= IMAGE =================
let img=new Image();

imageInput.onchange=e=>{
img.src=URL.createObjectURL(e.target.files[0]);
img.onload=startAutoVideo;
};

// ================= NETFLIX COLOR =================
function netflixColor(frame){
const exp=1.05+Math.sin(frame*0.04)*0.015;
ctx.filter=`contrast(1.23) saturate(0.92) brightness(${exp})`;
}
function resetColor(){ctx.filter="none";}

// ================= LIGHT FILM GRAIN =================
const grain=document.createElement("canvas");
const gctx=grain.getContext("2d");
grain.width=80;
grain.height=140;

function filmGrain(){
const data=gctx.createImageData(grain.width,grain.height);
const b=data.data;

for(let i=0;i<b.length;i+=4){
const v=120+Math.random()*22;
b[i]=b[i+1]=b[i+2]=v;
b[i+3]=10;
}

gctx.putImageData(data,0,0);
ctx.globalAlpha=0.08;
ctx.drawImage(grain,0,0,canvas.width,canvas.height);
ctx.globalAlpha=1;
}

// ================= REAL UFC CAMERA SYSTEM =================
let camX=0, camY=0;
let velX=0, velY=0;

function camera(frame){

// kamera maju (operator movement)
let targetX = frame * 0.6;
let targetY = Math.sin(frame*0.05)*40;

// physics acceleration
velX += (targetX-camX)*0.05;
velY += (targetY-camY)*0.05;

// damping (berat kamera nyata)
velX *= 0.82;
velY *= 0.82;

camX += velX;
camY += velY;

// micro hand movement
const microX=Math.sin(frame*0.7)*1.2;
const microY=Math.cos(frame*0.6)*1;

// impact kecil natural
const impact=Math.sin(frame*0.9)*2;

// zoom natural
let zoom=1.15 + frame*0.0009;

return{
x:camX+microX+impact,
y:camY+microY,
scale:zoom
};
}

// ================= DRAW =================
function drawFrame(frame){

netflixColor(frame);

const cam=camera(frame);

const ratio=Math.max(
canvas.width/img.width,
canvas.height/img.height
);

const w=img.width*ratio*cam.scale;
const h=img.height*ratio*cam.scale;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(
img,
(canvas.width-w)/2+cam.x,
(canvas.height-h)/2+cam.y,
w,h
);

filmGrain();
resetColor();
}

// ================= AUTO VIDEO EXPORT =================
let recorder,chunks=[];
let frame=0;
const maxFrame=360; // ±12 detik @120fps

function startAutoVideo(){

const stream=canvas.captureStream(120);

let options={mimeType:'video/mp4;codecs=h264'};
if(!MediaRecorder.isTypeSupported(options.mimeType)){
options={mimeType:'video/webm'};
}

recorder=new MediaRecorder(stream,options);
chunks=[];

recorder.ondataavailable=e=>{
if(e.data.size>0)chunks.push(e.data);
};

recorder.onstop=()=>{
const blob=new Blob(chunks,{type:options.mimeType});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="cinematic_ai_video.mp4";
a.click();
};

recorder.start();

frame=0;

function animate(){

drawFrame(frame);

// cepat tanpa slow motion
frame+=2.6;

if(frame<maxFrame){
requestAnimationFrame(animate);
}else{
recorder.stop();
}
}

animate();
}

</script>

</body>
</html>
