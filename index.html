<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>REAL OBJECT MOTION AI</title>

<style>
body{
background:#000;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
width:92vw;
max-width:360px;
border:2px solid white;
margin-top:10px;
}
</style>
</head>

<body>

<h3>REAL OBJECT MOTION (NOT CAMERA SHAKE)</h3>

<input type="file" id="upload" accept="image/*"><br>
<canvas id="c" width="720" height="1280"></canvas><br>
<button onclick="generate()">GENERATE VIDEO</button>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let img=new Image();
let ready=false;

upload.onchange=e=>{
img.src=URL.createObjectURL(e.target.files[0]);
img.onload=()=>{
ready=true;
drawBase();
};
};

// ================= BASE IMAGE =================
function drawBase(){
ctx.drawImage(img,0,0,canvas.width,canvas.height);
}

// ================= OBJECT PHYSICS =================
let objX=0,objY=0;
let velX=0,velY=0;

function objectMotion(frame){

// gerakan manusia nyata (bukan goyang)
const targetX=Math.sin(frame*0.05)*14;
const targetY=Math.cos(frame*0.04)*24;

velX+=(targetX-objX)*0.08;
velY+=(targetY-objY)*0.08;

velX*=0.85;
velY*=0.85;

objX+=velX;
objY+=velY;

return {x:objX,y:objY};
}

// ================= FILM GRAIN =================
function grain(){
ctx.globalAlpha=0.08;
for(let i=0;i<60;i++){
ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.03})`;
ctx.fillRect(
Math.random()*canvas.width,
Math.random()*canvas.height,
1,1
);
}
ctx.globalAlpha=1;
}

// ================= DRAW FRAME =================
function drawFrame(frame){

// background DIAM
ctx.drawImage(img,0,0,canvas.width,canvas.height);

// area objek (tengah)
const maskW=canvas.width*0.5;
const maskH=canvas.height*0.55;
const maskX=canvas.width*0.25;
const maskY=canvas.height*0.25;

const m=objectMotion(frame);

ctx.save();

ctx.beginPath();
ctx.rect(maskX,maskY,maskW,maskH);
ctx.clip();

// hanya objek bergerak
ctx.drawImage(
img,
m.x,
m.y,
canvas.width,
canvas.height
);

ctx.restore();

grain();
}

// ================= VIDEO EXPORT =================
function generate(){

if(!ready){
alert("Upload gambar dulu");
return;
}

const FPS=60;
const duration=12;
const total=FPS*duration;

const stream=canvas.captureStream(FPS);

const recorder=new MediaRecorder(stream,{
mimeType:"video/webm;codecs=vp9"
});

let chunks=[];

recorder.ondataavailable=e=>{
if(e.data.size>0) chunks.push(e.data);
};

recorder.onstop=()=>{
const blob=new Blob(chunks,{type:"video/webm"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="real_ai_motion.mp4";
a.click();
};

recorder.start();

let frame=0;

function animate(){
drawFrame(frame);
frame++;

if(frame<total){
requestAnimationFrame(animate);
}else{
recorder.stop();
}
}

animate();
}
</script>

</body>
</html>
